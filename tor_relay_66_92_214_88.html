
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  .tr { --tg:#7dcd85;--tgd:#2a5c30;--td:#0d1117;--ts:#161b22;--tb:#21262d;--tm:#8b949e;--tt:#c9d1d9;--mono:'Share Tech Mono',monospace;background:var(--td);color:var(--tt);font-family:var(--mono);font-size:13px;border-radius:10px;overflow:hidden }
  .tr-nav{background:var(--ts);border-bottom:1px solid var(--tb);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
  .tr-brand{color:var(--tg);font-size:13px;display:flex;align-items:center;gap:8px}
  .tr-navlinks{display:flex;gap:4px}
  .tr-navlinks a{font-size:11px;color:var(--tm);padding:4px 10px;border-radius:4px;text-decoration:none;transition:background .15s,color .15s}
  .tr-navlinks a:hover{background:var(--tb);color:var(--tt)}
  .tr-hero{padding:28px 24px 24px;border-bottom:1px solid var(--tb)}
  .tr-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--tg);border:1px solid var(--tgd);border-radius:20px;padding:3px 10px;background:rgba(125,205,133,.06);margin-bottom:12px}
  .pulse{width:7px;height:7px;background:var(--tg);border-radius:50%;animation:pulse 2s ease-in-out infinite}
  .offline-dot{width:7px;height:7px;background:#e3b341;border-radius:50%}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
  .tr-fp{font-size:10px;color:var(--tm);margin-bottom:8px;letter-spacing:.04em;word-break:break-all}
  .tr-fp span{color:var(--tg)}
  .tr-title{font-size:24px;color:#e6edf3;margin-bottom:6px;line-height:1.2}
  .tr-sub{color:var(--tm);font-size:12px;line-height:1.7;max-width:520px;margin-bottom:18px;font-family:sans-serif}
  .tr-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .tr-btn{font-size:11px;padding:7px 16px;border-radius:5px;border:1px solid var(--tgd);color:var(--tg);background:rgba(125,205,133,.06);cursor:pointer;font-family:var(--mono);text-decoration:none;transition:background .2s}
  .tr-btn:hover{background:rgba(125,205,133,.14)}
  .tr-btn-ghost{font-size:11px;padding:7px 16px;border-radius:5px;border:1px solid var(--tb);color:var(--tm);background:transparent;cursor:pointer;font-family:var(--mono);text-decoration:none;transition:background .2s,color .2s}
  .tr-btn-ghost:hover{background:var(--ts);color:var(--tt)}
  .stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--tb);border:1px solid var(--tb);border-radius:7px;overflow:hidden}
  .stat-cell{background:var(--ts);padding:12px 14px}
  .slabel{font-size:10px;letter-spacing:.08em;color:var(--tm);margin-bottom:4px;text-transform:uppercase}
  .sval{font-size:18px;color:var(--tg);line-height:1}
  .sunit{font-size:10px;color:var(--tm)}
  .tr-section{padding:22px 24px;border-bottom:1px solid var(--tb)}
  .sec-head{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tm);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .sec-head::after{content:'';flex:1;height:1px;background:var(--tb)}
  .info-tbl{width:100%;border-collapse:collapse}
  .info-tbl tr{border-bottom:1px solid var(--tb)}
  .info-tbl tr:last-child{border-bottom:none}
  .info-tbl td{padding:7px 0;font-size:12px}
  .info-tbl td:first-child{color:var(--tm);width:180px;font-size:11px}
  .pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin:2px 3px 2px 0}
  .pg{background:rgba(125,205,133,.1);color:var(--tg);border:1px solid var(--tgd)}
  .pm{background:var(--tb);color:var(--tm)}
  .bw-wrap{background:var(--tb);border-radius:3px;height:3px;margin-top:5px}
  .bw-bar{height:3px;background:var(--tg);border-radius:3px;transition:width 1s ease}
  .circuit-node{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--ts);border:1px solid var(--tb);border-radius:6px;margin-bottom:1px}
  .circuit-node.active{border-color:#1d4070}
  .ndot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .ndot-g{background:var(--tg)}.ndot-b{background:#58a6ff}.ndot-m{background:var(--tm)}
  .nlabel{font-size:12px;color:var(--tt);flex:1}
  .nmeta{font-size:10px;color:var(--tm)}
  .role-tag{font-size:10px;padding:2px 8px;border-radius:20px}
  .rg{background:rgba(125,205,133,.1);color:var(--tg);border:1px solid var(--tgd)}
  .rm{background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid #1d3050}
  .re{background:rgba(227,179,65,.1);color:#e3b341;border:1px solid #4a3a10}
  .rd{background:var(--tb);color:var(--tm)}
  .c-arrow{text-align:center;color:var(--tb);font-size:12px;padding:2px 0;letter-spacing:.2em}
  .loading-msg{color:var(--tm);font-size:13px;padding:40px 24px;text-align:center}
  .err-msg{color:#e3b341;font-size:12px;padding:24px;background:rgba(227,179,65,.05);border:1px solid rgba(227,179,65,.2);border-radius:6px;margin:16px 24px}
  footer{padding:14px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  footer span,footer a{font-size:10px;color:#3a4550;text-decoration:none}
  footer a:hover{color:var(--tm)}
  .uptime-row{display:flex;gap:3px;flex-wrap:wrap}
  .ub{width:11px;height:11px;border-radius:2px}
  .u-up{background:var(--tg);opacity:.85}.u-dn{background:var(--tb)}
</style>

<div class="tr" id="root">
  <div class="tr-nav">
    <div class="tr-brand">
      <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
        <ellipse cx="11" cy="11" rx="9" ry="9" stroke="#7dcd85" stroke-width="1" opacity=".3"/>
        <ellipse cx="11" cy="11" rx="6.5" ry="6.5" stroke="#7dcd85" stroke-width="1" opacity=".55"/>
        <ellipse cx="11" cy="11" rx="3.8" ry="3.8" stroke="#7dcd85" stroke-width="1" opacity=".8"/>
        <circle cx="11" cy="11" r="1.6" fill="#7dcd85"/>
      </svg>
      66.92.214.88
    </div>
    <div class="tr-navlinks">
      <a href="https://metrics.torproject.org/rs.html#search/66.92.214.88" target="_blank">relay search ↗</a>
      <a href="https://metrics.torproject.org" target="_blank">metrics ↗</a>
    </div>
  </div>
  <div class="loading-msg" id="loading">
    <div style="margin-bottom:8px">fetching relay data from onionoo.torproject.org...</div>
    <div style="font-size:11px;color:#3a4550">querying 66.92.214.88</div>
  </div>
  <div id="content" style="display:none"></div>
</div>

<script>
const IP = '66.92.214.88';

function fmt(n) {
  if (n == null) return 'N/A';
  if (n >= 1e9) return (n/1e9).toFixed(1) + ' GB/s';
  if (n >= 1e6) return (n/1e6).toFixed(1) + ' MB/s';
  if (n >= 1e3) return (n/1e3).toFixed(1) + ' KB/s';
  return n + ' B/s';
}
function fmtDate(s) { return s ? s.replace('T',' ').slice(0,16)+' UTC' : 'N/A'; }

async function load() {
  try {
    const res = await fetch(`https://onionoo.torproject.org/details?search=${IP}`);
    const data = await res.json();
    const relay = data.relays && data.relays[0];
    if (!relay) {
      document.getElementById('loading').innerHTML = `<div class="err-msg">No relay found for ${IP}. This IP may not be a currently active Tor relay, or it may not have been seen in the past week.<br><br><a href="https://metrics.torproject.org/rs.html#search/${IP}" target="_blank" style="color:var(--tg)">Check on Relay Search ↗</a></div>`;
      return;
    }
    render(relay);
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div class="err-msg">Failed to fetch from onionoo.torproject.org: ${e.message}<br><br><a href="https://metrics.torproject.org/rs.html#search/${IP}" target="_blank" style="color:var(--tg)">View on Relay Search ↗</a></div>`;
  }
}

function render(r) {
  const running = r.running;
  const flags = r.flags || [];
  const isExit = flags.includes('Exit');
  const isGuard = flags.includes('Guard');
  const role = isExit ? 'exit' : isGuard ? 'guard/middle' : 'middle';
  const roleClass = isExit ? 're' : isGuard ? 'rg' : 'rm';

  const adv = r.advertised_bandwidth;
  const obs = r.observed_bandwidth;
  const rate = r.bandwidth_rate;
  const burst = r.bandwidth_burst;

  const fp = r.fingerprint || '';
  const fpFmt = fp.match(/.{1,4}/g)?.join(' ') || fp;

  const exitPolicy = r.exit_policy_summary;
  let exitStr = 'N/A';
  if (exitPolicy) {
    if (exitPolicy.reject) exitStr = 'reject *:*';
    else if (exitPolicy.accept) exitStr = 'accept (exit relay)';
  }

  const html = `
    <div class="tr-hero">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="tr-badge">
          ${running ? '<div class="pulse"></div>ONLINE' : '<div class="offline-dot"></div>OFFLINE'}
        </div>
        <span style="font-size:11px;color:var(--tm)">${role} · ${r.country_name || r.country || 'Unknown'} · ${r.as_name || r.as || 'Unknown AS'}</span>
      </div>
      <div class="tr-fp">fingerprint // <span>${fpFmt}</span></div>
      <div class="tr-title">${r.nickname}</div>
      <div class="tr-sub">${r.platform || 'Platform unknown'} — ${r.city_name ? r.city_name + ', ' : ''}${r.country_name || ''}. ${r.contact ? 'Contact: ' + r.contact.slice(0,80) : 'No contact info provided.'}</div>
      <div class="tr-btns">
        <a href="https://metrics.torproject.org/rs.html#details/${fp}" target="_blank" class="tr-btn">View on Relay Search ↗</a>
        <a href="https://metrics.torproject.org/rs.html#search/${IP}" target="_blank" class="tr-btn-ghost">metrics.torproject.org ↗</a>
      </div>
      <div class="stat-grid">
        <div class="stat-cell"><div class="slabel">Adv BW</div><div class="sval" style="font-size:14px">${fmt(adv)}</div></div>
        <div class="stat-cell"><div class="slabel">Observed</div><div class="sval" style="font-size:14px">${fmt(obs)}</div></div>
        <div class="stat-cell"><div class="slabel">Cons. Weight</div><div class="sval">${(r.consensus_weight||0).toLocaleString()}</div></div>
        <div class="stat-cell"><div class="slabel">First Seen</div><div class="sval" style="font-size:11px;padding-top:4px">${(r.first_seen||'').slice(0,10)}</div></div>
        <div class="stat-cell"><div class="slabel">OR Port</div><div class="sval">${(r.or_addresses||['?'])[0].split(':').pop()}</div></div>
        <div class="stat-cell"><div class="slabel">Version</div><div class="sval" style="font-size:11px;padding-top:4px">${r.version||'N/A'}</div></div>
      </div>
    </div>

    <div class="tr-section">
      <div class="sec-head">relay information</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <table class="info-tbl">
          <tr><td>Nickname</td><td>${r.nickname}</td></tr>
          <tr><td>IP Address</td><td>${IP}</td></tr>
          <tr><td>Country</td><td>${r.country ? r.country.toUpperCase() : '?'} — ${r.country_name||'Unknown'}</td></tr>
          <tr><td>Region</td><td>${r.region_name||'N/A'}</td></tr>
          <tr><td>City</td><td>${r.city_name||'N/A'}</td></tr>
          <tr><td>AS</td><td>${r.as||'N/A'} — ${r.as_name||'N/A'}</td></tr>
          <tr><td>OR Address</td><td>${(r.or_addresses||[]).join(', ')||'N/A'}</td></tr>
          <tr><td>Dir Address</td><td>${r.dir_address||'disabled'}</td></tr>
          <tr><td>Exit Policy</td><td style="color:${isExit?'#e3b341':'var(--tm)'}">${exitStr}</td></tr>
        </table>
        <table class="info-tbl">
          <tr><td>Platform</td><td style="font-size:11px">${r.platform||'N/A'}</td></tr>
          <tr><td>Tor Version</td><td>${r.version||'N/A'}</td></tr>
          <tr><td>Version Status</td><td style="color:${r.version_status==='recommended'?'var(--tg)':'#e3b341'}">${r.version_status||'N/A'}</td></tr>
          <tr><td>First Seen</td><td>${fmtDate(r.first_seen)}</td></tr>
          <tr><td>Last Seen</td><td>${fmtDate(r.last_seen)}</td></tr>
          <tr><td>Last Restart</td><td>${fmtDate(r.last_restarted)}</td></tr>
          <tr><td>Flags</td><td>${flags.map(f=>`<span class="pill pg">${f}</span>`).join('')||'None'}</td></tr>
          <tr><td>Fingerprint</td><td style="font-size:10px;color:var(--tm);word-break:break-all">${fp}</td></tr>
          <tr><td>Contact</td><td style="font-size:10px;color:var(--tm);word-break:break-all">${r.contact||'Not provided'}</td></tr>
        </table>
      </div>
    </div>

    <div class="tr-section">
      <div class="sec-head">bandwidth</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:16px">
        <div>
          <div class="slabel">Advertised</div>
          <div style="font-size:16px;color:var(--tg)">${fmt(adv)}</div>
          <div class="bw-wrap"><div class="bw-bar" style="width:${adv&&rate?Math.min(100,adv/rate*100).toFixed(0):0}%"></div></div>
        </div>
        <div>
          <div class="slabel">Observed</div>
          <div style="font-size:16px;color:var(--tg)">${fmt(obs)}</div>
          <div class="bw-wrap"><div class="bw-bar" style="width:${obs&&rate?Math.min(100,obs/rate*100).toFixed(0):50}%"></div></div>
        </div>
        <div>
          <div class="slabel">Burst Cap</div>
          <div style="font-size:16px;color:var(--tg)">${fmt(burst)}</div>
          <div class="bw-wrap"><div class="bw-bar" style="width:100%"></div></div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--tm);margin-bottom:6px">position probabilities</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        <div>
          <div class="slabel">Guard prob</div>
          <div style="font-size:14px;color:var(--tg)">${r.guard_probability!=null?(r.guard_probability*100).toFixed(4)+'%':'N/A'}</div>
        </div>
        <div>
          <div class="slabel">Middle prob</div>
          <div style="font-size:14px;color:var(--tg)">${r.middle_probability!=null?(r.middle_probability*100).toFixed(4)+'%':'N/A'}</div>
        </div>
        <div>
          <div class="slabel">Exit prob</div>
          <div style="font-size:14px;color:var(--tg)">${r.exit_probability!=null?(r.exit_probability*100).toFixed(4)+'%':'N/A'}</div>
        </div>
      </div>
    </div>

    <div class="tr-section">
      <div class="sec-head">circuit position</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">
        <div>
          <div class="circuit-node"><div class="ndot ndot-g"></div><div><div class="nlabel">Client</div><div class="nmeta">Tor Browser / proxy</div></div></div>
          <div class="c-arrow">↓ 3 layers encrypted</div>
          ${isGuard ? `<div class="circuit-node active"><div class="ndot ndot-g"></div><div style="flex:1"><div class="nlabel">${r.nickname} ← this relay</div><div class="nmeta">${IP}</div></div><span class="role-tag rg">guard</span></div>
          <div class="c-arrow">↓ 2 layers</div>
          <div class="circuit-node"><div class="ndot ndot-b"></div><div style="flex:1"><div class="nlabel">Middle Node</div><div class="nmeta">somewhere in the network</div></div><span class="role-tag rm">middle</span></div>` :
          `<div class="circuit-node"><div class="ndot ndot-g"></div><div style="flex:1"><div class="nlabel">Guard Node</div><div class="nmeta">entry point</div></div><span class="role-tag rg">guard</span></div>
          <div class="c-arrow">↓ 2 layers</div>
          <div class="circuit-node active"><div class="ndot ndot-b"></div><div style="flex:1"><div class="nlabel">${r.nickname} ← this relay</div><div class="nmeta">${IP}</div></div><span class="role-tag rm">middle</span></div>`}
          <div class="c-arrow">↓ 1 layer</div>
          ${isExit ?
          `<div class="circuit-node active"><div class="ndot ndot-m"></div><div style="flex:1"><div class="nlabel">${r.nickname} also exits</div><div class="nmeta">connects to the public internet</div></div><span class="role-tag re">exit</span></div>` :
          `<div class="circuit-node"><div class="ndot ndot-m"></div><div style="flex:1"><div class="nlabel">Exit Node</div><div class="nmeta">connects to public internet</div></div><span class="role-tag re">exit</span></div>`}
          <div class="c-arrow">↓ TLS / plaintext</div>
          <div class="circuit-node"><div class="ndot ndot-m"></div><div style="flex:1"><div class="nlabel">Destination</div><div class="nmeta">target website / service</div></div><span class="role-tag rd">dest</span></div>
        </div>
        <div style="font-family:sans-serif;font-size:12px;color:var(--tm);line-height:1.8">
          <p style="margin-bottom:10px"><strong style="color:var(--tt)">${r.nickname}</strong> is a <strong style="color:var(--tt)">${role}</strong> relay running in ${r.city_name||r.country_name||'an unknown location'}, operated on ${r.as_name||r.as||'an unknown AS'}.</p>
          <p style="margin-bottom:10px">Exit policy: <strong style="color:${isExit?'#e3b341':'var(--tt)'}">${exitStr}</strong>. ${isExit ? 'This relay exits traffic to the public internet.' : 'This relay does not exit traffic to the public internet.'}</p>
          <p>First seen in the network on <strong style="color:var(--tt)">${(r.first_seen||'').slice(0,10)||'unknown'}</strong>. Consensus weight: <strong style="color:var(--tt)">${(r.consensus_weight||0).toLocaleString()}</strong>.</p>
        </div>
      </div>
    </div>

    <footer>
      <span>${r.nickname} · ${IP} · ${r.country_name||''} · ${r.as||''}</span>
      <span>
        <a href="https://www.torproject.org" target="_blank">torproject.org</a>
        &nbsp;·&nbsp;
        <a href="https://metrics.torproject.org/rs.html#details/${fp}" target="_blank">relay details</a>
        &nbsp;·&nbsp;
        <a href="https://community.torproject.org/relay/" target="_blank">relay guide</a>
      </span>
    </footer>
  `;

  document.getElementById('loading').style.display = 'none';
  const c = document.getElementById('content');
  c.style.display = 'block';
  c.innerHTML = html;
}

load();
</script>
